<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/png"

    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cruisin' Route 66 - America's Mother Road</title>

    <!-- Google Fonts: Retro Route 66 vibe -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Custom Route 66 Overrides -->
    <link rel="stylesheet" href="./assets/route66-custom.css" />

    <style>
      /* Close button */
      .banner-close {
        position: absolute;
        top: 6px;
        right: 10px;
        font-size: 22px;
        color: #fff;
        cursor: pointer;
        z-index: 10000;
        font-weight: bold;
        line-height: 1;
      }
      .banner-close:hover {
        opacity: 0.7;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-CHPeQfM5.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CS7MPlzW.css">
  </head>

  <body>
    <!-- Static Navigation to State Pages -->
    <div style="position:fixed; top:0; right:0; z-index:99999; padding:10px 16px; background: linear-gradient(135deg, #e8590c, #d9480f); border-radius: 0 0 0 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.3);">
      <a href="./states/index.html" style="color:white; text-decoration:none; font-weight:700; font-family:'Inter', sans-serif; font-size:0.9rem; display:flex; align-items:center; gap:6px;">
        🗺️ Browse All States & Attractions
      </a>
    </div>
    <div id="root"></div>

    <!-- Sticky Bottom Banner -->
    <div class="bottom-banner" id="bottomBanner">
      <!-- Close Button -->
      <div class="banner-close" onclick="document.getElementById('bottomBanner').style.display='none'">
        ×
      </div>

      <div class="bottom-banner-inner">
        <!-- Entire text area clickable -->
        <a
          href="https://amzn.to/3JPW2Ks"
          target="_blank"
          rel="noopener noreferrer"
          class="bottom-banner-text"
          style="text-decoration:none; color:inherit; display:block;"
        >
          <div class="bottom-banner-eyebrow"></div>
          <div class="bottom-banner-headline">EZ66 Guide - 5th Ed.</div>
          <div class="bottom-banner-subtitle">by Jerry McClanahan</div>
        </a>

        <a
          href="https://amzn.to/3JPW2Ks"
          class="bottom-banner-cta"
          target="_blank"
          rel="noopener noreferrer"
        >
          BUY
        </a>
      </div>
    </div>

  </body>
